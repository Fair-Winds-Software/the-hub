# Authorized by HUB-71 — CI pipeline: migrate + test against live PostgreSQL on every PR and push
# Authorized by HUB-77 — Redis service added; JWT_SECRET + REDIS_URL added to CI env
# Authorized by HUB-112 — OPERATOR_JWT_SECRET added to CI env
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hub_test
          POSTGRES_USER: hub
          POSTGRES_PASSWORD: hub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://hub:hub_test@localhost:5432/hub_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: hub-ci-jwt-secret-not-for-production
      OPERATOR_JWT_SECRET: hub-ci-operator-jwt-secret-not-for-production
      DB_POOL_SIZE: 5
      DB_IDLE_TIMEOUT_MS: 5000
      # DATABASE_URL, REDIS_URL, JWT_SECRET, OPERATOR_JWT_SECRET are intentionally not echoed in any step — treat CI logs as public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Run tests
        run: npm test
