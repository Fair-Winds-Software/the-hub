# Authorized by HUB-1581 — A11y + CWV CI gate for the Console Shell.
# Builds the frontend, runs Playwright + @axe-core/playwright e2e scans (AC#1, #3, #4, #5),
# then runs Lighthouse CI against the cold-load /console/login route (AC#2).
# Per D-HUB-SCOPE-051, /console/dashboard Lighthouse measurement is deferred to HUB-1562
# because Lighthouse cannot inherit the per-page in-memory Zustand session from a
# puppeteerScript-driven login flow.
name: A11y + CWV

on:
  push:
  pull_request:

jobs:
  a11y-perf:
    name: Frontend a11y + Lighthouse
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: E2E + a11y (Playwright + @axe-core/playwright)
        run: npm run e2e

      - name: Lighthouse CI (/console/login)
        run: npm run lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
